<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oturum Aç — Guidentry</title>
  <meta name="description" content="Guidentry admin paneline giriş yapın." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav scrolled" id="nav">
    <div class="nav__inner">
      <a href="./" class="nav__logo">
        <div class="nav__logo-icon">🧭</div>
        <span>Guidentry</span>
      </a>
      <div class="nav__hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
      <div class="nav__links" id="navLinks">
        <a href="./" class="nav__link">Anasayfa</a>
        <a href="./about.html" class="nav__link">Hakkımızda</a>
        <a href="./contact.html" class="nav__link">İletişim</a>
        <a href="./login.html" class="nav__link active">Oturum Aç</a>
        <a href="./register.html" class="btn btn--primary btn--sm nav__cta">Rehber Olarak Üye Ol</a>
        <div class="nav__lang">EN</div>
      </div>
    </div>
  </nav>

  <!-- Login -->
  <section class="auth">
    <div class="auth__bg"></div>
    <div class="auth__card glass-card" data-animate="scale-in">
      <h1 class="auth__title">Admin Girişi</h1>
      <p class="auth__subtitle">E-posta ve şifrenizle giriş yapın</p>

      <form data-validate>
        <div class="form-group">
          <label class="form-label" for="login-email">E-posta</label>
          <input type="email" id="login-email" class="form-input" placeholder="admin@guidentry.com.tr" required />
        </div>

        <div class="form-group" style="position:relative;">
          <label class="form-label" for="login-password">Şifre</label>
          <div style="position:relative;">
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" required />
            <span class="password-toggle">👁️</span>
          </div>
        </div>

        <button type="submit" class="btn btn--primary auth__submit">Giriş Yap</button>
      </form>

      <div class="auth__footer">
        <a href="./">← Anasayfaya Dön</a>
      </div>
    </div>
  </section>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
